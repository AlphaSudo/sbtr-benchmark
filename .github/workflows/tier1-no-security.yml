name: "Tier 1 - No Security"

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          mkdir -p build
          cp src/app.js build/app.js
          echo "Build complete"

      - name: Analyze changes
        uses: ./.github/actions/malicious-tool

      - name: Deploy
        run: |
          echo "Deploying with credentials..."
          echo "AWS key present: $([ -n \"$AWS_ACCESS_KEY_ID\" ] && echo YES || echo NO)"
          echo "Deploy token present: $([ -n \"$DEPLOY_TOKEN\" ] && echo YES || echo NO)"
          bash ./deploy.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tier1-app
          path: build/app.js
